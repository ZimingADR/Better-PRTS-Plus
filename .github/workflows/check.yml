name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check userscript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run project checks
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tool/check.ps1

  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint
        run: npm install --no-save --no-package-lock @commitlint/cli @commitlint/config-conventional

      - name: Lint pull request commits
        if: github.event_name == 'pull_request'
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Lint pushed commits
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: npx commitlint --from "${{ github.event.before }}" --to "${{ github.sha }}" --verbose

      - name: Lint initial push commit
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        run: npx commitlint --last --verbose
