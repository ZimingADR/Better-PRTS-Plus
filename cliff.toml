[changelog]
header = ""
body = """
{% if version %}\
## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/ntgmc/Better-PRTS-Plus/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}\
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat(\\(.+\\))?!:", group = "<!-- 0 -->Breaking Changes" },
  { message = "^fix(\\(.+\\))?!:", group = "<!-- 0 -->Breaking Changes" },
  { body = "BREAKING CHANGE:", group = "<!-- 0 -->Breaking Changes" },
  { message = "^feat", group = "<!-- 1 -->Features" },
  { message = "^fix", group = "<!-- 2 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 3 -->Performance" },
  { message = "^refactor", group = "<!-- 4 -->Refactoring" },
  { message = "^docs", group = "<!-- 5 -->Documentation" },
  { message = "^ci", group = "<!-- 6 -->Maintenance" },
  { message = "^build", group = "<!-- 6 -->Maintenance" },
  { message = "^test", group = "<!-- 6 -->Maintenance" },
  { message = "^style", group = "<!-- 6 -->Maintenance" },
  { message = "^chore", group = "<!-- 6 -->Maintenance" },
  { message = "^revert", group = "<!-- 6 -->Maintenance" },
]
